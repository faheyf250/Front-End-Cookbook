{% extends "base.html" %}
{% block content %}
	<h1>{{ recipe.title }}</h1>
	<hr>
	<h3>Ingredients</h3>
	<ul>
		{% for ing in recipe.ingredients.split(' | ') %}
			<li>{{ ing }}</li>
		{% endfor %}
	</ul>
	<hr>
	<h3>Instructions</h3>
	<p>{{ recipe.instructions }}</p>
	<br>
	<a href="{{ url_for('dashboard') }}"> <-- Back to Home</a>
{% endblock %}
