{% extends "base.html" %}
{% block content %}

<h1>Recipes</h1>

{% for recipe in recipes %}
    <div class="recipe-card">
        <h2>
            <a href="{{ url_for('view_recipe', recipe_id=recipe.id) }}">
                {{ recipe.title }}
            </a>
        </h2>

        <h3>Ingredients</h3>
        <ul>
            {% for ing in recipe.ingredients %}
                <li>{{ ing.quantity }} {{ ing.unit }} {{ ing.name }}</li>
            {% endfor %}
        </ul>

        <p>
            <a href="{{ url_for('view_recipe', recipe_id=recipe.id) }}">
                View Full Recipe
            </a>
        </p>
    </div>
{% endfor %}

{% endblock %}
