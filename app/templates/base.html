<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Front End Cookbook{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #EAE1D4;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background-color: #f4f4f4;
            border-bottom: 1px solid #ddd;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .top-actions {
            display: flex;
            gap: 10px;
        }

        .top-actions a,
        .top-actions button {
            padding: 8px 14px;
            border: none;
            background-color: #CF6E44;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
	.recipe-card img {
    max-width: 250px;
    border-radius: 6px;
    margin-top: 10px;
}
        .top-actions a:hover,
        .top-actions button:hover {
            background-color: #555;
        }

        .navbar {
            background-color: #7A8960;
        }

        .nav-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 0;
            padding: 12px 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
   
        .user-circle {
    width: 34px;
    height: 34px;
    background-color: #CF6E44;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
}
        .page-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        .form-group textarea {
            resize: vertical;
        }

        .main-button {
            padding: 10px 16px;
            border: none;
            background-color: #333;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .main-button:hover {
            background-color: #555;
        }

        .ingredient-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .ingredient-row input[type="text"] {
            flex: 2;
        }

        .ingredient-row input[type="number"] {
            width: 100px;
        }

        .ingredient-row select {
            width: 140px;
        }

        .recipe-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            background-color: #fff;
        }
	.delete-button {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    background-color: #b23b3b;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.delete-button:hover {
    background-color: #7f2929;
}

        .recipe-card img {
            max-width: 250px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .star-rating-form {
    display: inline-flex;
    gap: 2px;
    margin-bottom: 12px;
    }

    .star-button {
    border: none;
    background: none;
    color: #CF6E44;
    font-size: 26px;
    cursor: pointer;
    padding: 0 2px;
}

.star-button:hover,
.star-button:hover ~ .star-button {
    color: #999;
}




    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo">Front End Cookbook</div>

        <div class="top-actions">
            <form action="{{ url_for('search') }}" method="GET" style="display:inline;">
                <input type="text" name="q" placeholder="Search recipes">
                <button type="submit">Search</button>
            </form>

            {% if session.get("user_id") %}
                <div class="user-circle">
                    {{ session.get("user_initials") }}
                </div>

                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
            {% endif %}
        </div>
    </div>

    <div class="navbar">
        <ul class="nav-links">
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('recipes') }}">Recipes</a></li>
            <li><a href="{{ url_for('create_recipe') }}">Create Recipe</a></li>
        </ul>
    </div>

    <main class="page-container">
        {% block content %}{% endblock %}
    </main>
    </body>
    </html>
