{% extends "base.html" %}

{% block title %}Create Recipe{% endblock %}

{% block content %}

<h1>Create a Recipe</h1>

<form method="POST" action="{{ url_for('create_recipe') }}" enctype="multipart/form-data">

    <div class="form-group">
        <label for="title">Recipe Title</label>
        <input type="text" id="title" name="title" required>
    </div>

    <h3>Ingredients</h3>

    <div id="ingredients-container">
        <div class="ingredient-row">
            <input type="number" name="quantity[]" placeholder="Quantity">

            <select name="unit[]">
                <option value="">Unit</option>
                <option value="cup">cup</option>
                <option value="tbsp">tbsp</option>
                <option value="tsp">tsp</option>
                <option value="oz">oz</option>
                <option value="lb">lb</option>
                <option value="g">g</option>
                <option value="ml">ml</option>
                <option value="whole">whole</option>
            </select>

            <input type="text" name="ingredient[]" placeholder="Ingredient">
        </div>
    </div>

    <button type="button" class="main-button" id="add-ingredient-button">
        Add Ingredient
    </button>

    <br><br>
<div class="form-group">
    <label for="recipe_image">Recipe Photo</label>
    <input type="file" id="recipe_image" name="recipe_image" accept="image/*">
</div>
    <div class="form-group">
        <label for="instructions">Instructions</label>
        <textarea id="instructions" name="instructions" rows="8" required></textarea>
    </div>

    <button type="submit" class="main-button">Create Recipe</button>

</form>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const addButton = document.getElementById("add-ingredient-button");
    const container = document.getElementById("ingredients-container");

    addButton.addEventListener("click", function () {
        const row = document.createElement("div");
        row.classList.add("ingredient-row");

        row.innerHTML = `
            <input type="number" name="quantity[]" placeholder="Quantity">

            <select name="unit[]">
                <option value="">Unit</option>
                <option value="cup">cup</option>
                <option value="tbsp">tbsp</option>
                <option value="tsp">tsp</option>
                <option value="oz">oz</option>
                <option value="lb">lb</option>
                <option value="g">g</option>
                <option value="ml">ml</option>
                <option value="whole">whole</option>
            </select>

            <input type="text" name="ingredient[]" placeholder="Ingredient">
        `;

        container.appendChild(row);
    });
});
</script>

{% endblock %}
